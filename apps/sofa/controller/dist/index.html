<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curve Controller</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; width: 100%; height: 100%; overflow: hidden;
      font-family: Menlo, Monaco, Consolas, monospace;
      background: #0a0d11; color: #f2f6ff;
    }
    canvas {
      width: 100%; height: 100%; display: block;
      background: radial-gradient(circle at 10% 10%, #172033 0%, #0a0d11 55%);
    }
    #hud {
      position: absolute; top: 14px; left: 14px;
      padding: 10px 12px;
      background: rgba(5,9,16,0.72);
      border: 1px solid rgba(173,191,229,0.25);
      border-radius: 8px; font-size: 13px; line-height: 1.6;
      backdrop-filter: blur(4px); min-width: 220px;
    }
    #hud .row { white-space: nowrap; }
    #state-input {
      width: 100%; margin-top: 6px; padding: 4px 6px;
      background: rgba(255,255,255,0.08); color: #f2f6ff;
      border: 1px solid rgba(173,191,229,0.3); border-radius: 4px;
      font: 12px Menlo, Monaco, Consolas, monospace;
      outline: none;
    }
    #state-input:focus { border-color: rgba(136,170,255,0.6); }
  </style>
  <script type="module" crossorigin src="/assets/index-CXp_P2UW.js"></script>
</head>
<body>
  <canvas id="view"></canvas>
  <div id="hud">
    <div class="row">Drag p1/p2 handle to set tangent</div>
    <div class="row">Click curve to grab + deform</div>
    <div class="row">Drag empty space: pan | Wheel: zoom</div>
    <div class="row" id="info"></div>
    <div class="row" id="state"></div>
    <input id="state-input" type="text" placeholder="Paste state to restore...">
  </div>
</body>
</html>
